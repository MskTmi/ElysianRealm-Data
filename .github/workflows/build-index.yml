name: Build Index

on:
    push:
        branches:
            - master
        paths:
            - data/**
            - meta/**
            - scripts/build-index.js
            - .github/workflows/build-index.yml
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build-index:
        if: github.actor != 'github-actions[bot]'
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Generate dist index
              run: node scripts/build-index.js

            - name: Commit dist changes
              run: |
                  if git diff --quiet -- dist/elysian-realm-index.json; then
                    echo "dist index unchanged"
                    exit 0
                  fi

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add dist/elysian-realm-index.json
                  git commit -m "chore: rebuild dist index"
                  git push
