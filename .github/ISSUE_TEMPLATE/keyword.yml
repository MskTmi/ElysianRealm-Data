name: 关键词提交
description: 提交或补充角色关键词
title: "[Keyword] "
labels:
  - keyword
body:
  - type: markdown
    attributes:
      value: |
        请使用此模板提交角色关键词。

        提交前请先确认：
        - 角色 ID 与 keywords 目录中的文件名一致，例如 Human 对应 keywords/Human.json。
        - 关键词每行一个，避免把多个词写在同一行。
        - 若关键词可能与其他角色重合，可直接提交，仓库会按最新更新时间优先匹配。

  - type: input
    id: role
    attributes:
      label: 角色 ID
      description: 对应 keywords 目录中的文件名，不包含 .json 后缀。
      placeholder: Human
    validations:
      required: true

  - type: textarea
    id: keywords
    attributes:
      label: 关键词列表
      description: 每行一个关键词，请按常用检索词填写。
      placeholder: |
        人律乐土
        爱律乐土
      render: text
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 备注
      description: 可选。用于补充别名来源、适用版本或冲突说明。
      placeholder: 可留空

  - type: checkboxes
    id: confirm
    attributes:
      label: 提交确认
      options:
        - label: 我已确认角色 ID 填写正确，并与目标关键词文件对应。
          required: true
        - label: 我已确认关键词按每行一个填写，没有混入多余说明文字。
          required: true
